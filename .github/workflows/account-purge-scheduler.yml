name: Account Purge Scheduler

on:
  schedule:
    - cron: '15 2 * * *' # Daily at 02:15 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: 'Batch size for purge processing'
        required: false
        default: '50'

jobs:
  run-purge:
    runs-on: ubuntu-latest
    steps:
      - name: Determine limit
        id: params
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            echo "limit=${{ github.event.inputs.limit }}" >> "$GITHUB_OUTPUT"
          else
            echo "limit=50" >> "$GITHUB_OUTPUT"
          fi

      - name: Invoke purge endpoint
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LIMIT: ${{ steps.params.outputs.limit }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY secret is missing" >&2
            exit 1
          fi

          echo "Calling purge endpoint with limit=$LIMIT"
          response=$(curl -sS -X POST "https://ugphaeiqbfejnzpiqdty.supabase.co/functions/v1/process-due-account-purges" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"limit\":$LIMIT}")

          echo "Response: $response"
          echo "$response" | grep -q '"success":true' || {
            echo "Purge endpoint did not return success=true" >&2
            exit 1
          }
